<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 660" width="400" height="660">
  <defs>
    <linearGradient id="bg-minor-wands-03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c2a0e"/>
      <stop offset="100%" style="stop-color:#3b1a06"/>
    </linearGradient>
    <linearGradient id="border-minor-wands-03" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a84c"/>
      <stop offset="100%" style="stop-color:#e8a84c88"/>
    </linearGradient>
  </defs>

  <!-- 牌面背景 -->
  <rect x="8" y="8" width="384" height="644" rx="20" ry="20" fill="url(#bg-minor-wands-03)" stroke="url(#border-minor-wands-03)" stroke-width="3"/>

  <!-- 内边框 -->
  <rect x="28" y="28" width="344" height="604" rx="14" ry="14" fill="none" stroke="#e8a84c" stroke-width="1" opacity="0.3"/>

  <!-- 牌号/罗马数字 -->
  <text x="200" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="#e8a84c" opacity="0.9">3</text>

  <!-- 花色符号 -->
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="40"
        fill="#e8a84c" opacity="0.5">🪵</text>

  <!-- 牌名（中文） -->
  <text x="200" y="430" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif"
        font-size="32" font-weight="bold" fill="#e8a84c">权杖三</text>

  <!-- 英文名 -->
  <text x="200" y="478" text-anchor="middle" font-family="Georgia,serif" font-size="16"
        fill="#e8a84c" opacity="0.5">Three of Wands</text>

  <!-- 底部装饰线 -->
  <line x1="80" y1="540" x2="320" y2="540" stroke="#e8a84c" stroke-width="0.5" opacity="0.2"/>
</svg>